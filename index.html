<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Jiu-Jitsu Check-In</title>
        <link rel="stylesheet" href="css/styles.css"/>
        <link rel="stylesheet" href="css/variables.css"/>
        <link rel="icon" href="#"/>
        <script src="main.js" defer></script>
    </head>
    <body>
        <main>
            <div class="nameAthleteContainer">
                <label class="nameAthleteLabel" for="nameAthlete"></label>
                <input id="nameAthleteInput" name="nameAthlete" type="text" placeholder="Digite seu nome"/>  
            </div>
            <div class="nameAthleteContainer">
                <select id="selectTypeBeltOption" name="selectTypeBelt">
                    <option value="" disabled selected>Escolha sua faixa</option>
                    <option value="Branca">Faixa Branca</option>
                    <option value="Azul">Faixa Azul</option>
                    <option value="Roxa">Faixa Roxa</option>
                    <option value="Marrom">Faixa Marrom</option>
                    <option value="Preta">Faixa Preta</option>
                </select>
            </div>
            <button class="btnAddAthlete">Add Athlete</button>
            <ul class="listAthlete"></ul>
        </main>
    </body>
</html>
